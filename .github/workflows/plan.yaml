name: Terraform Plan

on:
  pull_request:
    branches:
      - main

  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  terraform-plan:
    runs-on: ubuntu-latest

    steps:
      - name: Terraform setup
        uses: QRify-platform/github-actions/terraform-setup@main
        with:
          aws-role-to-assume: ${{ vars.AWS_TF_ROLE_TO_ASSUME }}
          aws-region: us-east-2

      - name: Terraform Plan
        run: terraform plan
