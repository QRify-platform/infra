name: Terraform Apply

on:
  push:
    branches:
      - main

  workflow_dispatch:

  # Called by Rebuild Platform (Tier-1 DR)
  workflow_call:

permissions:
  id-token: write
  contents: read

jobs:
  terraform-apply:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials from OIDC
        uses: aws-actions/configure-aws-credentials@v2
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: us-east-2

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.11.1
          terraform_wrapper: false

      - name: Terraform Init
        run: terraform init

      # Pass 1: cluster must exist before Helm/Kubernetes providers can auth
      - name: Terraform Apply (EKS)
        run: terraform apply -target=module.eks -auto-approve

      # Pass 2: Helm charts and remaining resources
      - name: Terraform Apply (full stack)
        run: terraform apply -auto-approve
