name: Terraform Destroy

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  terraform-destroy:
    runs-on: ubuntu-latest

    steps:
      - name: Terraform setup
        uses: QRify-platform/github-actions/terraform-setup@main
        with:
          aws-role-to-assume: ${{ vars.AWS_TF_ROLE_TO_ASSUME }}
          aws-region: us-east-2

      # Route53 aliases read the ingress LB hostname from the live Service.
      # Destroy those records BEFORE draining LBs, while the hostname still exists.
      - name: Destroy Route53 aliases while ingress LB still exists
        run: |
          terraform destroy -auto-approve \
            -target=module.nginx_ingress.aws_route53_record.apex \
            -target=module.nginx_ingress.aws_route53_record.dev \
            -target=module.nginx_ingress.aws_route53_record.portal \
            -target=module.nginx_ingress.aws_route53_record.portal_dev

      # LoadBalancer Services leave ELB ENIs that block DetachInternetGateway.
      - name: Drain LoadBalancer services before destroy
        uses: QRify-platform/github-actions/eks-drain-loadbalancers@main
        with:
          aws-region: us-east-2
          cluster-name: qrify-eks

      - name: Terraform Destroy
        run: terraform destroy -auto-approve
